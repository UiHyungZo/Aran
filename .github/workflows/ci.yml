name: CI

on:
  push:
    branches: [spm, main, ci]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$LATEST/Contents/Developer"

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  domain-test:
    name: Domain Unit Tests (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM (AranDomain)
        uses: actions/cache@v4
        with:
          path: Packages/AranDomain/.build
          key: ${{ runner.os }}-spm-domain-${{ hashFiles('Packages/AranDomain/Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-domain-

      - name: swift test (AranDomain)
        run: swift test --package-path Packages/AranDomain --enable-code-coverage

      - name: Upload coverage (AranDomain)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: Packages/AranDomain
          flags: domain
          fail_ci_if_error: false

  unit-test:
    name: Unit Tests (xcodebuild)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM (Xcode DerivedData)
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('Packages/AranDomain/Package.swift', 'Packages/AranData/Package.swift') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: Create Secrets.xcconfig
        run: cp Aran/Configuration/Secrets.xcconfig.example Aran/Configuration/Secrets.xcconfig

      - name: xcodebuild test (AranTests)
        run: |
          set -o pipefail && xcodebuild test \
            -project Aran.xcodeproj \
            -scheme AranTests \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | grep -E "^(Build|Test|error:|warning:|✓|✗|Executed)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult

      - name: Upload coverage (AranTests)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          xcode: true
          xcode_archive_path: TestResults.xcresult
          flags: unit
          fail_ci_if_error: false
