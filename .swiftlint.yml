excluded:
  - Packages/AranData/.build
  - Packages/AranDomain/.build

line_length:
  warning: 150
  error: 250
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1300

type_body_length:
  warning: 400
  error: 800

function_body_length:
  warning: 60
  error: 160

disabled_rules:
  - trailing_whitespace
  - identifier_name
  - function_parameter_count
  - large_tuple

opt_in_rules:
  - closure_spacing
  - explicit_init
